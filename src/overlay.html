<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' file: data: https:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>DeskPal Overlay</title>
    <link rel="stylesheet" href="./overlay.css" />
  </head>
  <body>
    <main id="stage" aria-label="DeskPal desktop overlay">
      <canvas id="effects-canvas" aria-hidden="true"></canvas>
      <button id="update-pill" class="update-pill interactive" type="button" hidden aria-live="polite">
        <span class="update-pill__icon">↻</span>
        <strong class="update-pill__text">Update</strong>
        <em class="update-pill__version"></em>
      </button>
      <section id="pet-panel" class="pet-panel interactive" hidden></section>
    </main>
    <script type="module" src="./overlay.js"></script>
  </body>
</html>
