name: Build BusyPet Desktop

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            script: package:mac
            archive: mac
            debArch: ""
            artifact: "BusyPet Desktop-macOS"
          - name: Windows x64
            os: windows-latest
            script: package:win
            archive: win
            debArch: ""
            artifact: "BusyPet Desktop-win32-x64"
          - name: Ubuntu x64
            os: ubuntu-latest
            script: package:linux
            archive: linux
            debArch: x64
            artifact: "BusyPet Desktop-linux-x64"
          - name: Ubuntu arm64
            os: ubuntu-latest
            script: package:linux:arm64
            archive: linux:arm64
            debArch: arm64
            artifact: "BusyPet Desktop-linux-arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Package
        run: npm run ${{ matrix.script }}

      - name: Archive
        run: npm run archive:${{ matrix.archive }}

      - name: Package Ubuntu deb
        if: matrix.debArch != ''
        run: npm run package:deb -- ${{ matrix.debArch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
